<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Lato:400,700,900"
      rel="stylesheet"
    />
    <title>Simple Bank App</title>
    <link
      rel="icon"
      href="data:image/svg+xml,
    <svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
      <text y=%22.9em%22 font-size=%2290%22>🐷</text>
    </svg>"
    />
    <link rel="stylesheet" href="./resources/css/style.css" />
    <link rel="stylesheet" href="./resources/css/reset.min.css" />
  </head>

  <body>
    <div class="sidebar">
      <ul>
        <li><a href="timeline.html">Timeline</a></li>
        <li onclick="clearData()">Clear Data</li>
      </ul>
    </div>

    <div class="sidebar-overlay" id="sideBarOverlay"></div>

    <div class="container">
      <div class="menu-icon" id="btnMenu">
        <i class="material-icons">sort</i>
      </div>

      <div class="menu-icon" id="btnClose" style="display: none">
        <i class="material-icons">close</i>
      </div>

      <div class="center">
        <div class="savings-container">
          <div class="savings" id="txtSavings"></div>
          <div class="in-savings">In Savings</div>
        </div>
      </div>
      <div class="end"></div>
    </div>

    <div class="piggy">
      <img src="resources/img/piggy-money-bank-5085515_1280.png" />
    </div>

    <div class="feed-form" style="display: none">
      <div class="toggle-tool">
        <span>Deposit</span>
        <input type="checkbox" class="toggle" id="toggleType" />
        <span>Withdraw</span>
      </div>
      <input type="number" placeholder="Amount" min="0" id="inptAmount" />
    </div>

    <div class="feed-button-wrapper">
      <button name="feed" id="btnFeed">Feed</button>
    </div>

    <ul class="timeline" id="listTimeline">
      <a href="timeline.html" class="view-timeline"></a>
    </ul>

    <div class="charts">
      <div>
        <!-- <canvas id="chartWithdraw" width="500" height="200"></canvas> -->
        <canvas id="chartWithdraw"></canvas>
      </div>
      <div>
        <!-- <canvas id="chartDeposits" width="500" height="200"></canvas> -->
        <canvas id="chartDeposits"></canvas>
      </div>
      <div class="chart-last">
        <!-- <canvas id="chartSavings" width="500" height="200"></canvas> -->
        <canvas id="chartSavings"></canvas>
      </div>
    </div>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.7.0/Chart.min.js"
      charset="utf-8"
    ></script>
    <script src="./resources/scripts/flow.js"></script>
    <script src="./resources/scripts/script.js"></script>
  </body>
</html>
